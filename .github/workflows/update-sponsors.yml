name: Pitter Patter Sponsors Update
run-name: ${{ github.actor }} is updating Pitter Patter sponsors
on:
  pull_request:
    types:
      - closed
    branches:
      - main
# on: [push]
jobs:
  update-sponsors:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Run update sponsor script
        working-directory: update-sponsors
        run: cargo run -- --logo_block_path="$GITHUB_WORKSPACE/logo-block.md" --readme_path="$GITHUB_WORKSPACE/README.md"
      - name: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "updated sponsors" --allow-empty
          git push origin main
      - name: clone
        env:
          REPO_PAT: ${{ secrets.REPO_ACCESS_PAT }}
        run: |
          GIT_LFS_SKIP_SMUDGE=1 git clone https://pdiffley:$REPO_PAT@github.com/handlewithcarecollective/pitter-patter
      - name: Run update sponsor script
        working-directory: update-sponsors
        run: cargo run -- --logo_block_path="$GITHUB_WORKSPACE/logo-block.md" --readme_path="$GITHUB_WORKSPACE/pitter-patter/README.md"
      - name: commit
        working-directory: pitter-patter
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "updated sponsors" --allow-empty
          git push origin main
