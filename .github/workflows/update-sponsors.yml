name: Pitter Patter Sponsors Update
run-name: ${{ github.actor }} is updating Pitter Patter sponsors
on: [push]
  # pull_request:
  #   types:
  #     - closed
  #   branches:
  #     - main
jobs:
  update-sponsors:
    # if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
      # - name: Install Rust
      #   run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - name: ls
        run: ls
      - name: ls logo
        run: ls logos
      - name: pwd
        run: pwd
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          repository: handlewithcarecollective/pitter-patter
          path: pitter-patter
      - name: Run update sponsor script
        working-directory: update-sponsors
        run: cargo run -- --logo_dir="$GITHUB_WORKSPACE/logos" --readme_path="$GITHUB_WORKSPACE/pitter-patter/README.md"
      - name: cat
        run: cat "$GITHUB_WORKSPACE/pitter-patter/README.md"
      - name: ls
        run: ls
      - name: ls
        run: ls pitter-patter
      - name: echo
        run: echo "$GITHUB_WORKSPACE"
      - name: pwd
        run: pwd

